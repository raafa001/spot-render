name: Kubernetes Deploy

on:
  workflow_dispatch:
    inputs:
      overlay:
        description: Target Kustomize overlay
        required: true
        type: choice
        options:
          - local
          - prd
      namespace:
        description: Kubernetes namespace override (opcional)
        required: false
        default: ""
      dry-run:
        description: Dry run (validate only)
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1

jobs:
  validate:
    name: Validate Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: v5.5.0

      - name: Validate Kustomize overlays
        run: |
          for dir in k8s/base k8s/overlays/${{ inputs.overlay }}; do
            if [ ! -f "$dir/kustomization.yaml" ]; then
              echo "::error::Missing kustomization in $dir"
              exit 1
            fi
          done
          kustomize build k8s/overlays/${{ inputs.overlay }} >/tmp/rendering.yaml
          kubectl apply --dry-run=client -f /tmp/rendering.yaml >/dev/null
          echo "Overlay ${{ inputs.overlay }} validated via kubectl apply --dry-run"

  deploy:
    name: Deploy
    needs: validate
    runs-on: ubuntu-latest
    if: ${{ !inputs.dry-run }}
    steps:
      - uses: actions/checkout@v4

      - uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: v5.5.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Create namespace override (optional)
        if: ${{ inputs.namespace != '' }}
        run: kubectl create namespace ${{ inputs.namespace }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply overlay
        env:
          TARGET_NAMESPACE: ${{ inputs.namespace != '' && inputs.namespace || 'rendering' }}
        run: |
          kustomize build k8s/overlays/${{ inputs.overlay }} | kubectl apply -f -
          kubectl get pods -n "$TARGET_NAMESPACE"
          kubectl get svc -n "$TARGET_NAMESPACE"

      - name: Verify deployment
        env:
          TARGET_NAMESPACE: ${{ inputs.namespace != '' && inputs.namespace || 'rendering' }}
        run: |
          kubectl get pods -n "$TARGET_NAMESPACE"
          kubectl get svc -n "$TARGET_NAMESPACE"

  dry-run:
    name: Dry Run
    needs: validate
    runs-on: ubuntu-latest
    if: ${{ inputs.dry-run }}
    steps:
      - uses: actions/checkout@v4

      - uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: v5.5.0

      - name: Dry-run render
        run: |
          kustomize build k8s/overlays/${{ inputs.overlay }} >/tmp/rendering.yaml
          kubectl apply --dry-run=client -f /tmp/rendering.yaml >/dev/null
          echo "## Dry Run Summary" >> $GITHUB_STEP_SUMMARY
          resources=$(grep -c '^kind:' /tmp/rendering.yaml || true)
          echo "Overlay ${{ inputs.overlay }} renderizou ${resources} recursos" >> $GITHUB_STEP_SUMMARY

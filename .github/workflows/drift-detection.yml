name: Drift Detection

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  drift:
    name: Detect Terraform Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        run: terraform init -input=false
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Plan (Drift Check)
        id: plan
        run: terraform plan -no-color -detailed-exitcode
        working-directory: terraform
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Check for Drift
        if: steps.plan.outputs.exitcode == 2
        run: |
          echo "::warning::TERRAFORM DRIFT DETECTED! Infrastructure has drifted from the state file."
          echo "DRIFT_DETECTED=true" >> $GITHUB_ENV

      - name: Create Issue for Drift
        if: env.DRIFT_DETECTED == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['drift']
            });
            const driftIssue = issues.find(i => i.title.includes('Terraform Drift'));
            if (!driftIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🚨 Terraform Drift Detected',
                body: 'Terraform plan detected infrastructure drift. Run `terraform apply` to reconcile.\n\nTriggered by: Drift Detection workflow',
                labels: ['drift', 'automated']
              });
            }

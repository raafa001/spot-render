name: Drift Detection

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  issues: write

env:
  AWS_REGION: us-east-1
  TF_BACKEND_BUCKET: ${{ vars.TF_STATE_BUCKET != '' && vars.TF_STATE_BUCKET || 'spot-render-terraform-state' }}
  TF_BACKEND_KEY: global/terraform.tfstate
  TF_IN_AUTOMATION: 'true'

jobs:
  drift:
    name: Detect Terraform Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          role-session-name: terraformDrift
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.0

      - name: Terraform init
        working-directory: infra/terraform
        run: terraform init -input=false -backend-config="bucket=${{ env.TF_BACKEND_BUCKET }}" -backend-config="key=${{ env.TF_BACKEND_KEY }}" -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform plan (drift)
        id: plan
        working-directory: infra/terraform
        run: |
          set +e
          terraform plan -no-color -detailed-exitcode -input=false -out=tfplan.binary
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          if [ "$exit_code" -eq 1 ]; then
            exit 1
          fi
          terraform show -json tfplan.binary > tfplan.json
          if [ "$exit_code" -eq 2 ]; then
            echo "DRIFT_DETECTED=true" >> $GITHUB_ENV
          fi
          exit 0

      - name: Upload drift artifacts
        if: steps.plan.outputs.exit_code == '2'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-drift-plan
          path: |
            infra/terraform/tfplan.binary
            infra/terraform/tfplan.json

      - name: Summarize plan
        if: steps.plan.outputs.exit_code == '2'
        working-directory: infra/terraform
        run: |
          echo "## Drift detected" >> $GITHUB_STEP_SUMMARY
          terraform show tfplan.binary >> $GITHUB_STEP_SUMMARY

      - name: Create Issue for Drift
        if: env.DRIFT_DETECTED == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['drift']
            });
            const driftIssue = issues.find(i => i.title.includes('Terraform Drift'));
            if (!driftIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🚨 Terraform Drift Detected',
                body: 'Terraform plan detected infrastructure drift. Run `terraform apply` to reconcile.\n\nTriggered by: Drift Detection workflow',
                labels: ['drift', 'automated']
              });
            }

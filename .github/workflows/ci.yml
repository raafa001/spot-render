name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

jobs:
  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
        continue-on-error: true

      - name: Hadolint (API)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.api
        continue-on-error: true

      - name: Hadolint (Worker)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.worker
        continue-on-error: true

  sonarqube:
    name: SonarQube Scan
    runs-on: self-hosted
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Check Sonar credentials
        id: sonar-creds
        run: |
          if [ -z "${SONAR_HOST_URL}" ] || [ -z "${SONAR_TOKEN}" ]; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            echo "::warning::SONAR_HOST_URL/SONAR_TOKEN não configurados. SonarQube será ignorado nesta execução."
          else
            echo "missing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify Sonar availability
        if: steps.sonar-creds.outputs.missing == 'false'
        id: sonar-available
        run: |
          if curl -sf --connect-timeout 5 "${SONAR_HOST_URL}/api/system/status" >/tmp/sonar-status.json; then
            STATUS=$(python3 << 'EOF'
          import json
          from pathlib import Path
          status = "unknown"
          try:
              data = json.loads(Path('/tmp/sonar-status.json').read_text())
              status = data.get('status', 'unknown')
          except Exception:
              pass
          print(status)
          EOF
            )
            echo "reachable=true" >> "$GITHUB_OUTPUT"
            echo "SonarQube status: ${STATUS}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "reachable=false" >> "$GITHUB_OUTPUT"
            echo "warning - Não foi possível conectar ao SonarQube em ${SONAR_HOST_URL}. Etapa será ignorada." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: SonarQube
        if: steps.sonar-creds.outputs.missing == 'false' && steps.sonar-available.outputs.reachable == 'true'
        uses: sonarsource/sonarqube-scan-action@v2
        with:
          args: >
            -Dsonar.docker.args="--net=host"
        env:
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

      - name: Sonar skipped summary
        if: steps.sonar-creds.outputs.missing == 'true'
        run: echo "SonarQube scan skipped - configure SONAR_HOST_URL/SONAR_TOKEN secrets." >> "$GITHUB_STEP_SUMMARY"

      - name: Sonar unreachable summary
        if: steps.sonar-creds.outputs.missing == 'false' && steps.sonar-available.outputs.reachable == 'false'
        run: echo "SonarQube scan skipped - não foi possível alcançar ${SONAR_HOST_URL}." >> "$GITHUB_STEP_SUMMARY"

  trivy:
    name: Trivy Filesystem
    runs-on: self-hosted
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0

  unit-tests:
    name: API Unit Tests
    runs-on: self-hosted
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest --cov=services/api --cov-report=xml

  docker-build:
    name: Build & Publish Images
    runs-on: self-hosted
    needs:
      - lint
      - sonarqube
      - trivy
      - unit-tests
    env:
      AWS_REGION: us-east-1
      DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || 'spotrender' }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID || '123456789012' }}
    outputs:
      api_image: ${{ steps.images.outputs.api_image }}
      worker_image: ${{ steps.images.outputs.worker_image }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Define image targets
        id: images
        run: |
          SHA=${GITHUB_SHA:0:7}
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          else
            REGISTRY="docker.io/${DOCKERHUB_NAMESPACE}"
          fi
          echo "api_image=${REGISTRY}/spot-render-api:${SHA}" >> "$GITHUB_OUTPUT"
          echo "worker_image=${REGISTRY}/spot-render-worker:${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.images.outputs.api_image }}

      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.images.outputs.worker_image }}

      - name: Trivy image scan (API)
        if: github.event_name == 'push'
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ steps.images.outputs.api_image }}
          severity: CRITICAL,HIGH

      - name: Trivy image scan (worker)
        if: github.event_name == 'push'
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ steps.images.outputs.worker_image }}
          severity: CRITICAL,HIGH

  pr-comment:
    name: PR Comment Results
    if: github.event_name == 'pull_request'
    runs-on: self-hosted
    needs:
      - lint
      - sonarqube
      - trivy
      - unit-tests
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.

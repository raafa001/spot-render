name: Terraform Automation

on:
  push:
    branches: ['**']
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      command:
        description: Terraform command
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
      confirm:
        description: Confirm apply/destroy
        required: true
        type: choice
        options:
          - "no"
          - "yes"
        default: "no"
      working-dir:
        description: Target working directory
        required: true
       type: choice
       options:
          - infra/terraform

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-plan:
    if: >
      (github.event_name == 'pull_request') ||
      (github.event_name == 'push' && github.ref != 'refs/heads/main')
    uses: raafa001/github-workflows/.github/workflows/terraform-plan-apply.yml@main
    with:
      working-dirs: '["infra/terraform"]'
      command: plan
      pr-number: ${{ github.event.pull_request.number || 0 }}
      ref: ${{ github.event.pull_request.head.sha || github.sha }}
    secrets: inherit

  comment-plan:
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != '' &&
      startsWith(github.event.comment.body, '/terraform plan')
    uses: raafa001/github-workflows/.github/workflows/terraform-plan-apply.yml@main
    with:
      working-dirs: '["infra/terraform"]'
      command: plan
      pr-number: ${{ github.event.issue.number }}
      ref: refs/pull/${{ github.event.issue.number }}/head
    secrets: inherit

  comment-apply-destroy:
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != '' &&
      (startsWith(github.event.comment.body, '/terraform apply') ||
       startsWith(github.event.comment.body, '/terraform destroy'))
    runs-on: self-hosted
    steps:
      - name: Show apply/destroy instructions
        uses: actions/github-script@v7
        with:
          script: |
            const cmd = context.payload.comment.body.trim().split(' ')[1];
            const runUrl = '${{ github.server_url }}/${{ github.repository }}/actions/workflows/terraform-automation.yml';
            const prNum = context.payload.issue.number;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNum,
              body: `## Terraform ${cmd} — Confirmation Required

              To ${cmd} infrastructure, use **workflow_dispatch**:

              1. Go to [Terraform Automation Action](${runUrl})
              2. Click **Run workflow**
              3. Set \`command\` to \`${cmd}\`
              4. Set \`confirm\` to \`yes\`
              5. Select the target \`working-dir\`
              6. Click **Run workflow**

              ⚠️ This will ${cmd} infrastructure. Double-check the plan first!`
            });

  manual:
    if: github.event_name == 'workflow_dispatch'
    uses: raafa001/github-workflows/.github/workflows/terraform-plan-apply.yml@main
    with:
      working-dirs: '["${{ inputs.working-dir }}"]'
      command: ${{ inputs.command }}
      confirm: ${{ inputs.confirm }}
    secrets: inherit

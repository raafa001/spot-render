apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: monitoring
data:
  prometheus.rules: |
    groups:
    - name: KubernetesNode
      rules:
      - alert: HighCPUUsage
        expr: 100 - avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected on node {{ $labels.instance }}"
          description: "CPU usage is above 80% for 5 minutes on node {{ $labels.instance }}."
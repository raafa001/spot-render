apiVersion: v1
kind: PersistentVolume
metadata:
  name: render-assets-local
spec:
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: render-assets-sc
  local:
    path: /data/render-assets
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - docker-desktop
  mountOptions:
    - rw

apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: render-api
  namespace: rendering
  labels:
    app.kubernetes.io/name: render-api
    app.kubernetes.io/component: api
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: render-api
  strategy:
    canary:
      canaryService: render-api-canary
      stableService: render-api
      trafficRouting:
        nginx:
          stableIngress: render-api
      steps:
        - setWeight: 10
        - pause:
            duration: 300s
        - analysis:
            templates:
              - templateName: render-api-http-errors
            args:
              - name: service-name
                value: render-api
        - setWeight: 20
        - pause:
            duration: 300s
        - setWeight: 30
        - pause:
            duration: 300s
        - setWeight: 40
        - pause:
            duration: 300s
        - setWeight: 50
        - pause:
            duration: 300s
        - setWeight: 60
        - pause:
            duration: 300s
        - setWeight: 70
        - pause:
            duration: 300s
        - setWeight: 80
        - pause:
            duration: 300s
        - setWeight: 90
        - pause:
            duration: 300s
      analysis:
        templates:
          - templateName: render-api-http-errors
        args:
          - name: service-name
            value: render-api
        startingStep: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: render-api
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: render-api
      securityContext:
        fsGroup: 2000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: api
          image: ghcr.io/company/spot-render-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: rendering-env
          env:
            - name: RENDER_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: render-db
                  key: host
            - name: RENDER_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: render-db
                  key: password
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: blender-assets
              mountPath: /mnt/assets
              readOnly: true
      volumes:
        - name: blender-assets
          persistentVolumeClaim:
            claimName: render-assets
